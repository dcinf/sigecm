{{navbar}}
{{sidebar}}
  <main id="main" class="main">

    <div class="pagetitle">
      <h1>Funcionarios</h1>
      <nav>
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="index.html">Pagina Inicial</a></li>
          <li class="breadcrumb-item active">Funcionarios</li>
        </ol>
      </nav>
    </div><!-- End Page Title -->
    
 <section class="section dashboard">
    <div class="row">
      <!-- Recent Sales -->
      <div class="col-12">
        <div class="card recent-sales overflow-auto">

          <div class="filter">
            <a class="icon" href="#" data-bs-toggle="dropdown"><i class="bi bi-three-dots"></i></a>
            <ul class="dropdown-menu dropdown-menu-end dropdown-menu-arrow">
              <li class="dropdown-header text-start">
                <h6>Filter</h6>
              </li>

              <li><a class="dropdown-item" href="#">Today</a></li>
              <li><a class="dropdown-item" href="#">This Month</a></li>
              <li><a class="dropdown-item" href="#">This Year</a></li>
            </ul>
          </div>

          <div class="card-body">
            <h5 class="card-title">Lista dos funcionarios Cadastrados <span>| Today</span></h5>
            <div class="button__right" style="width: 100%; align-items: right; margin-bottom: 20px; height: 30px;">
                    <div class="button__content" style="display: flex; float: right; padding-right: 10px;">
                         <a type="button" href="{{URL}}/new-funcionario" class="btn btn-primary"><i class="bi bi-person-plus"></i> Cadastrar Funcionario</a>
                    </div>
              </div>

            <table class="table table-borderless datatable">
              <thead>
                <tr>
                  <th scope="col">#</th>
                  <th scope="col">Nome Completo</th>
                  <th scope="col">Patente</th>
                  <th scope="col">Departamento</th>
                  <th scope="col">Celular</th>
                  <th scope="col">Estado</th>
                </tr>
              </thead>
              <tbody>
                {{item}}
              </tbody>
            </table>
          </div>

        </div>
      </div><!-- End Recent Sales -->

    </div>
  </section>

  </main>

    {{footer}}
    {{status}}
